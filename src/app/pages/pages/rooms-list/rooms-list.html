<h1>Salas de votacion</h1>

<div *ngIf="rooms$ | async as rooms">
    <div class="table-wrapper">
        <table mat-table [dataSource]="rooms" class="mat-elevation-z8 rooms-table">

        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Nombre </th>
            <td mat-cell *matCellDef="let room"> {{ room.name }} </td>
        </ng-container>

        <ng-container matColumnDef="code">
            <th mat-header-cell *matHeaderCellDef> Codigo </th>
            <td mat-cell *matCellDef="let room"> {{ room.code }} </td>
        </ng-container>

        <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef> Estado </th>
            <td mat-cell *matCellDef="let room">
                <span class="status" [class.archived]="room.status === 'archived'">
                    {{ room.status }}
                </span>
            </td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef> Acciones </th>
            <td mat-cell *matCellDef="let room">
                <div class="actions">
                    <button mat-raised-button color="primary" (click)="enterRoom(room.code)"
                        [disabled]="room.status === 'archived'">
                        Entrar
                    </button>
                    <button mat-stroked-button color="warn" (click)="archiveRoom(room.code)"
                        [disabled]="room.status === 'archived'">
                        Archivar
                    </button>
                </div>
            </td>
        </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    </div>
</div>
