<h1>Salas de votacion</h1>

<div *ngIf="pagedRooms.length; else emptyTpl">
    <div class="table-wrapper desktop-only">
        <table mat-table [dataSource]="pagedRooms" class="mat-elevation-z8 rooms-table">

        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Nombre </th>
            <td mat-cell *matCellDef="let room" data-label="Nombre"> {{ room.name }} </td>
        </ng-container>

        <ng-container matColumnDef="code">
            <th mat-header-cell *matHeaderCellDef> Codigo </th>
            <td mat-cell *matCellDef="let room" data-label="Codigo"> {{ room.code }} </td>
        </ng-container>

        <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef> Estado </th>
            <td mat-cell *matCellDef="let room" data-label="Estado">
                <span class="status" [class.archived]="room.status === 'archived'">
                    {{ room.status }}
                </span>
            </td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef> Acciones </th>
            <td mat-cell *matCellDef="let room" data-label="Acciones">
                <div class="actions">
                    <button mat-raised-button color="primary" (click)="enterRoom(room.code)"
                        [disabled]="room.status === 'archived'">
                        Entrar
                    </button>
                    <button mat-stroked-button color="warn" (click)="archiveRoom(room.code)"
                        [disabled]="room.status === 'archived'">
                        Archivar
                    </button>
                </div>
            </td>
        </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    </div>

    <div class="cards mobile-only">
        <article class="room-card" *ngFor="let room of pagedRooms">
            <div class="card-row">
                <span class="label">Nombre</span>
                <span class="value">{{ room.name }}</span>
            </div>
            <div class="card-row">
                <span class="label">Codigo</span>
                <span class="value">{{ room.code }}</span>
            </div>
            <div class="card-row">
                <span class="label">Estado</span>
                <span class="value">
                    <span class="status" [class.archived]="room.status === 'archived'">
                        {{ room.status }}
                    </span>
                </span>
            </div>
            <div class="card-row actions-row">
                <button mat-raised-button color="primary" (click)="enterRoom(room.code)"
                    [disabled]="room.status === 'archived'">
                    Entrar
                </button>
                <button mat-stroked-button color="warn" (click)="archiveRoom(room.code)"
                    [disabled]="room.status === 'archived'">
                    Archivar
                </button>
            </div>
        </article>
    </div>

    <mat-paginator class="paginator" [length]="length" [pageSize]="pageSize" [pageIndex]="pageIndex"
        [pageSizeOptions]="pageSizeOptions" (page)="onPage($event)">
    </mat-paginator>
</div>

<ng-template #emptyTpl>
    <p class="empty">No hay salas para mostrar.</p>
</ng-template>
