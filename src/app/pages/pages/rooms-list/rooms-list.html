<h1>Salas de votación</h1>

<div *ngIf="rooms$ | async as rooms">
    <table mat-table [dataSource]="rooms" class="mat-elevation-z8">

        <!-- Nombre -->
        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Nombre </th>
            <td mat-cell *matCellDef="let room"> {{ room.name }} </td>
        </ng-container>

        <!-- Código -->
        <ng-container matColumnDef="code">
            <th mat-header-cell *matHeaderCellDef> Código </th>
            <td mat-cell *matCellDef="let room"> {{ room.code }} </td>
        </ng-container>

        <!-- Estado -->
        <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef> Estado </th>
            <td mat-cell *matCellDef="let room"> {{ room.status }} </td>
        </ng-container>

        <!-- Acciones -->
        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef> Acciones </th>
            <td mat-cell *matCellDef="let room">
                <button mat-raised-button color="primary" (click)="enterRoom(room.code)">
                    Entrar
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>
</div>
